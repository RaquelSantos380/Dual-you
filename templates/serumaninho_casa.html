<div id="casa-container" style="position: relative; width: 100%; max-width: 500px; margin: 10px auto; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); background: #f0f0f0;">
    
    <!-- Título da história -->
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 8px; color: white; text-align: center; font-size: 0.9rem; border-radius: 15px 15px 0 0;">
        📖 O Contador de Histórias
    </div>
    
    <!-- Imagem de fundo -->
    <div style="position: relative; width: 100%; aspect-ratio: 1/1; background: #2c3e50;">
        <img src="{{ url_for('background_image') }}" style="width: 100%; height: 100%; object-fit: contain; display: block;" alt="Casa do Alter Ego">
        
        <!-- O Alter Ego -->
        <img id="alter-personagem" src="{{ url_for('alter_image') }}" style="position: absolute; width: 40px; height: 50px; object-fit: contain; transform: translate(-50%, -50%); transition: all 0.8s ease; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); cursor: pointer;" alt="Alter Ego">
        
        <!-- BALÃO DE HISTÓRIA (maior para textos longos) -->
        <div id="alter-bolha" style="position: absolute; background: white; padding: 15px 20px; border-radius: 30px; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 3px solid #764ba2; display: none; max-width: 300px; text-align: center; z-index: 100; white-space: normal; word-wrap: break-word;">
            <div style="position: absolute; bottom: -12px; left: 20px; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 12px solid #764ba2;"></div>
            <span id="alter-mensagem" style="color: #333; line-height: 1.5;"></span>
            <div id="historia-continuacao" style="margin-top: 10px; font-size: 0.8rem; color: #764ba2; font-style: italic; display: none;">
                ⏳ Complete a próxima tarefa para continuar...
            </div>
        </div>
        
        <!-- Pequeno indicador de história -->
        <div id="historia-indicador" style="position: absolute; top: 10px; right: 10px; background: rgba(118,75,162,0.9); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            📚 História em andamento
        </div>
    </div>
    
    <!-- Última frase do Alter Ego (fixa) -->
    <div id="ultima-frase-container" style="background: rgba(118,75,162,0.1); padding: 10px; border-radius: 0 0 15px 15px; font-style: italic; color: #555; text-align: center; border-left: 3px solid #764ba2; font-size: 0.8rem; min-height: 50px;">
        💭 <span id="ultima-frase">Clique no Alter Ego para começar a história...</span>
    </div>
</div>

<style>
@keyframes bounce {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -55%) scale(1.05); }
}

#alter-personagem {
    animation: bounce 3s infinite;
}

@keyframes piscar {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}

#alter-bolha {
    animation: piscar 0.5s 3;
}
</style>

<script>
let ultimaFrase = '';
let fraseTimeout;

function atualizarAlterEgo() {
    fetch('/api/alterego')
        .then(response => response.json())
        .then(data => {
            const personagem = document.getElementById('alter-personagem');
            const container = document.getElementById('casa-container');
            
            // Posicionamento
            const containerImg = container.querySelector('img');
            if (!containerImg) return;
            
            const containerWidth = containerImg.offsetWidth;
            const containerHeight = containerImg.offsetHeight;
            const escalaX = containerWidth / 2048;
            const escalaY = containerHeight / 2048;
            
            const x = data.x_absoluto * escalaX;
            const y = data.y_absoluto * escalaY;
            
            personagem.style.left = x + 'px';
            personagem.style.top = y + 'px';
            
            // FRASE NOVA (história ou motivacional)
            if (data.ultima_frase && data.ultima_frase !== ultimaFrase && data.tem_frase_nova) {
                ultimaFrase = data.ultima_frase;
                
                const bolha = document.getElementById('alter-bolha');
                const msg = document.getElementById('alter-mensagem');
                msg.innerText = data.ultima_frase;
                
                bolha.style.left = (x - 150) + 'px';
                bolha.style.top = (y - 100) + 'px';
                bolha.style.display = 'block';
                
                document.getElementById('ultima-frase').innerText = '"' + data.ultima_frase + '"';
                
                if (fraseTimeout) clearTimeout(fraseTimeout);
                fraseTimeout = setTimeout(() => {
                    bolha.style.display = 'none';
                }, 8000);  // Mais tempo para ler histórias
            }
            
            // Interação ao clicar - PEDE HISTÓRIA
            personagem.onclick = function() {
                fetch('/api/alterego/historia')
                    .then(response => response.json())
                    .then(historiaData => {
                        const bolha = document.getElementById('alter-bolha');
                        document.getElementById('alter-mensagem').innerText = historiaData.frase;
                        
                        if (historiaData.precisa_tarefa) {
                            document.getElementById('historia-continuacao').style.display = 'block';
                        } else {
                            document.getElementById('historia-continuacao').style.display = 'none';
                        }
                        
                        bolha.style.left = (x - 150) + 'px';
                        bolha.style.top = (y - 100) + 'px';
                        bolha.style.display = 'block';
                        
                        setTimeout(() => {
                            bolha.style.display = 'none';
                        }, 10000);
                    });
            };
        });
}

setInterval(atualizarAlterEgo, 3000);
atualizarAlterEgo();
window.addEventListener('resize', atualizarAlterEgo);
</script>
