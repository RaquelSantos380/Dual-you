<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Meta tags para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dual You">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    
    <!-- Meta tags para Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    
    <title>Dual You - Sua Jornada Diária</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <!-- Mensagens flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background: #2a5a3a; color: #ffd700; padding: 8px; border: 2px solid #ffd700; margin-bottom: 10px; text-align: center; font-family: 'Press Start 2P', cursive; font-size: 0.5rem; box-shadow: 3px 3px 0 #1a2f3f;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
    
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">⚔️ DUAL YOU</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">⚔️ BATALHA</a>
                <a href="/planejamento" class="nav-link">📅 PLANEJA</a>
                <a href="/diario" class="nav-link">📖 DIÁRIO</a>
                <a href="/gratidao" class="nav-link">🙏 GRATIDÃO</a>
                <a href="/importantes" class="nav-link">⭐ IMPORTANTES</a>
            </div>
        </div>
    </nav>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
