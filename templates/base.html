<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Meta tags para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dual You">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    
    <!-- Meta tags para Android -->
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Meta tags gerais -->
    <meta name="description" content="Dual You - Enfrente o dia, complete tarefas e descubra histórias com seu Alter Ego">
    
    <title>Dual You - Enfrente o dia. Enfrente você mesmo.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/icons/icon-72x72.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">⚔️ Dual You</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">Batalha Diária</a>
                <a href="/planejamento" class="nav-link">Planejamento</a>
                <a href="/diario" class="nav-link">📖 Diário</a>
                <a href="/gratidao" class="nav-link">🙏 Gratidão</a>
                <a href="/importantes" class="nav-link">⭐ Importantes</a>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <!-- Mensagens flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" style="background: #2ecc71; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
