<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dual You - Enfrente o dia. Enfrente você mesmo.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">⚔️ Dual You</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">Batalha Diária</a>
                <a href="/planejamento" class="nav-link">Planejamento</a>
                <a href="/diario" class="nav-link">📖 Diário</a>
                <a href="/gratidao" class="nav-link">🙏 Gratidão</a>
                <a href="/importantes" class="nav-link">⭐ Importantes</a>
            </div>
        </div>
    </nav>
    
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" style="background: #2ecc71; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
